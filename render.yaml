services:
  - type: web
    name: maps-scraper
    env: python
    buildCommand: pip install -r requirements.txt && playwright install chromium && playwright install-deps
    startCommand: gunicorn --worker-class eventlet -w 1 app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: scraper-db
          property: connectionString

databases:
  - name: scraper-db
    plan: free
```

